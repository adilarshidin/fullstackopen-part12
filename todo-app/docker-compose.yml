services:
  todo-mongo-prod:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database
    volumes:
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - ./todo-backend/data:/data/db
    container_name: todo-mongo-prod

  todo-redis-prod:
    image: redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./todo-backend/data:/data
      - ./todo-backend/redis.conf:/usr/local/etc/redis/redis.conf
    container_name: todo-redis-prod

  todo-backend-prod:
    image: todo-backend
    build:
      context: ./todo-backend/
      dockerfile: ./todo-backend/dev.Dockerfile
    volumes:
      - ./todo-backend/:/usr/src/app
    container_name: todo-backend-prod
    environment:
      - MONGO_URL=mongodb://the_username:the_password@todo-mongo-prod:27017/the_database
      - REDIS_URL=redis://todo-redis-prod:6379
    depends_on:
      - todo-mongo-prod
      - todo-redis-prod

  todo-frontend-prod:
    image: todo-front
    build:
      context: ./todo-frontend/
      dockerfile: ./todo-frontend/dev.Dockerfile
    container_name: todo-frontend-prod
    depends_on:
      - todo-backend-prod

  todo-nginx-reverse-proxy-prod:
    image: nginx:1.29
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: todo-nginx-reverse-proxy-prod
    depends_on:
      - todo-frontend-prod
      - todo-backend-prod
