services:
  todo-mongo-dev:
    image: ini-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: the_database
    volumes:
      - ./todo-backend/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - ./todo-backend/data:/data/db
    container_name: todo-mongo-dev

  todo-redis-dev:
    image: redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./todo-backend/data:/data
      - ./todo-backend/redis.conf:/usr/local/etc/redis/redis.conf
    container_name: todo-redis-dev

  todo-backend-dev:
    image: todo-backend-dev
    build:
      context: ./todo-backend/
      dockerfile: ./todo-backend/dev.Dockerfile
    volumes:
      - ./todo-backend/:/usr/src/app
    container_name: todo-backend-dev
    environment:
      - MONGO_URL=mongodb://the_username:the_password@todo-mongo-dev:27017/the_database
      - REDIS_URL=redis://todo-redis-dev:6379
    depends_on:
      - todo-mongo-dev
      - todo-redis-dev

  todo-frontend-dev:
    image: todo-frontend-dev
    build:
      context: ./todo-frontend/
      dockerfile: ./todo-frontend/dev.Dockerfile
    volumes:
      - ./todo-frontend/:/usr/src/app
    container_name: todo-frontend-dev
    environment:
      - VITE_BACKEND_URL=/api
    depends_on:
      - todo-backend-dev

  todo-nginx-reverse-proxy-dev:
    image: nginx:1.29
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: todo-nginx-reverse-proxy-dev
    depends_on:
      - todo-frontend-dev
      - todo-backend-dev
